<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Request Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #4fc3f7; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #90a4ae; margin-bottom: 30px; }
        .section { margin-bottom: 25px; }
        .section h2 { color: #4fc3f7; font-size: 1.1rem; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #b0bec5; font-size: 0.9rem; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4fc3f7;
            background: rgba(79,195,247,0.1);
        }
        textarea { min-height: 80px; resize: vertical; }
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .radio-btn { display: flex; align-items: center; gap: 6px; }
        .radio-btn input { width: auto; margin: 0; }
        button {
            background: linear-gradient(135deg, #4b286d, #6a3d9a);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(75,40,109,0.4); }
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        .back-btn { background: rgba(255,255,255,0.1); color: #b0bec5; }
        .back-btn:hover { background: rgba(255,255,255,0.15); }
        .progress { width: 100%; height: 6px; background: #1e2a3a; border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4b286d, #4fc3f7); transition: width 0.3s; }
        .step-info { text-align: right; font-size: 0.85rem; color: #78909c; margin-bottom: 10px; }
        .hidden { display: none; }
        .success { background: rgba(76,175,80,0.1); border: 1px solid #4caf50; padding: 15px; border-radius: 8px; color: #81c784; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧪 NFT Request Form Builder</h1>
    <p class="subtitle">TELUS FueliX Platform - Performance Testing Form Generator</p>
    
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="step-info">
        <span id="stepInfo">Step 1 of 6</span>
    </div>

    <div id="formContainer"></div>
</div>

<script>
const sections = [
    {
        id: 'section1',
        title: 'Project Information',
        fields: [
            { id: 'project_name', label: 'Project Name *', type: 'text' },
            { id: 'wbs_code', label: 'WBS Code *', type: 'text' },
            { id: 'staging_date', label: 'Staging Release Date *', type: 'date' },
            { id: 'production_date', label: 'Production Release Date *', type: 'date' }
        ]
    },
    {
        id: 'section2',
        title: 'Environment & Technology',
        fields: [
            { id: 'tech_web', label: 'Web / HTML?', type: 'yesno' },
            { id: 'tech_services', label: 'Web Services?', type: 'yesno' },
            { id: 'tech_database', label: 'Database?', type: 'yesno' },
            { id: 'tech_batch', label: 'Batch Jobs?', type: 'yesno' }
        ]
    },
    {
        id: 'section3',
        title: 'Project Team',
        fields: [
            { id: 'ops_pm', label: 'OPS PM Name *', type: 'text' },
            { id: 'project_pm', label: 'Project PM Name *', type: 'text' },
            { id: 'bsa', label: 'BSA Name *', type: 'text' },
            { id: 'dev_prime', label: 'Dev Prime *', type: 'text' },
            { id: 'qa_prime', label: 'QA Prime *', type: 'text' },
            { id: 'perf_lead', label: 'Performance Test Lead *', type: 'text' }
        ]
    },
    {
        id: 'section4',
        title: 'Project Description',
        fields: [
            { id: 'high_level', label: 'High Level Project Description *', type: 'textarea' },
            { id: 'tech_req', label: 'Performance / Technical Requirements *', type: 'textarea' }
        ]
    },
    {
        id: 'section5',
        title: 'Architecture & Deployment',
        fields: [
            { id: 'architecture', label: 'Solution Architecture Description *', type: 'textarea' },
            { id: 'weblogic', label: 'WebLogic Domain Name', type: 'text' },
            { id: 'cluster', label: 'Cluster', type: 'text' },
            { id: 'using_soa', label: 'Using SOA?', type: 'yesno' }
        ]
    },
    {
        id: 'section6',
        title: 'Tests & Services',
        fields: [
            { id: 'test_load', label: 'Load Test?', type: 'yesno' },
            { id: 'test_stress', label: 'Stress Test?', type: 'yesno' },
            { id: 'test_stability', label: 'Stability/Soak Test?', type: 'yesno' },
            { id: 'test_resilience', label: 'Resilience & Recoverability?', type: 'yesno' },
            { id: 'svc_analysis', label: 'Analysis Service?', type: 'yesno' }
        ]
    }
];

let currentSection = 0;
let formData = JSON.parse(localStorage.getItem('nftData') || '{}');

function saveData() {
    localStorage.setItem('nftData', JSON.stringify(formData));
}

function renderSection() {
    const section = sections[currentSection];
    const container = document.getElementById('formContainer');
    
    let html = '<div class="section">';
    html += '<h2>' + section.title + '</h2>';
    
    section.fields.forEach(field => {
        html += '<label>' + field.label + '</label>';
        
        if (field.type === 'text' || field.type === 'date') {
            html += '<input type="' + field.type + '" id="' + field.id + '" value="' + (formData[field.id] || '') + '">';
        } else if (field.type === 'textarea') {
            html += '<textarea id="' + field.id + '">' + (formData[field.id] || '') + '</textarea>';
        } else if (field.type === 'yesno') {
            const val = formData[field.id] || '';
            html += '<div class="radio-group">';
            html += '<label class="radio-btn"><input type="radio" name="' + field.id + '" value="Y" ' + (val === 'Y' ? 'checked' : '') + '> Yes</label>';
            html += '<label class="radio-btn"><input type="radio" name="' + field.id + '" value="N" ' + (val === 'N' ? 'checked' : '') + '> No</label>';
            html += '<label class="radio-btn"><input type="radio" name="' + field.id + '" value="N/A" ' + (val === 'N/A' ? 'checked' : '') + '> N/A</label>';
            html += '</div>';
        }
    });
    
    html += '<div class="button-group">';
    if (currentSection > 0) {
        html += '<button class="back-btn" onclick="previousSection()">← Back</button>';
    }
    if (currentSection < sections.length - 1) {
        html += '<button onclick="nextSection()">Next →</button>';
    } else {
        html += '<button onclick="downloadForm()">📥 Download Form</button>';
    }
    html += '</div></div>';
    
    container.innerHTML = html;
    updateProgress();
}

function nextSection() {
    saveCurrentSection();
    if (currentSection < sections.length - 1) {
        currentSection++;
        renderSection();
        window.scrollTo(0, 0);
    }
}

function previousSection() {
    saveCurrentSection();
    if (currentSection > 0) {
        currentSection--;
        renderSection();
        window.scrollTo(0, 0);
    }
}

function saveCurrentSection() {
    const section = sections[currentSection];
    section.fields.forEach(field => {
        const element = document.getElementById(field.id);
        if (element) {
            if (field.type === 'yesno') {
                const checked = document.querySelector('input[name="' + field.id + '"]:checked');
                formData[field.id] = checked ? checked.value : '';
            } else {
                formData[field.id] = element.value;
            }
        }
    });
    saveData();
}

function updateProgress() {
    const percent = ((currentSection + 1) / sections.length) * 100;
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('stepInfo').textContent = 'Step ' + (currentSection + 1) + ' of ' + sections.length;
}

function downloadForm() {
    saveCurrentSection();
    
    let doc = 'NON FUNCTIONAL TESTING (NFT) REQUEST FORM\n';
    doc += '========================================\n';
    doc += 'Generated: ' + new Date().toLocaleDateString() + '\n';
    doc += 'Generated by: FueliX TELUS\n\n';
    
    doc += 'PROJECT INFORMATION\n';
    doc += '-------------------\n';
    doc += 'Project Name: ' + (formData.project_name || 'TBD') + '\n';
    doc += 'WBS Code: ' + (formData.wbs_code || 'TBD') + '\n';
    doc += 'Staging Release Date: ' + (formData.staging_date || 'TBD') + '\n';
    doc += 'Production Release Date: ' + (formData.production_date || 'TBD') + '\n\n';
    
    doc += 'TECHNOLOGY UNDER TEST\n';
    doc += '---------------------\n';
    doc += 'Web / HTML: ' + (formData.tech_web || 'N') + '\n';
    doc += 'Web Services: ' + (formData.tech_services || 'N') + '\n';
    doc += 'Database: ' + (formData.tech_database || 'N') + '\n';
    doc += 'Batch Jobs: ' + (formData.tech_batch || 'N') + '\n\n';
    
    doc += 'PROJECT TEAM\n';
    doc += '------------\n';
    doc += 'OPS PM: ' + (formData.ops_pm || '') + '\n';
    doc += 'Project PM: ' + (formData.project_pm || '') + '\n';
    doc += 'BSA: ' + (formData.bsa || '') + '\n';
    doc += 'Dev Prime: ' + (formData.dev_prime || '') + '\n';
    doc += 'QA Prime: ' + (formData.qa_prime || '') + '\n';
    doc += 'Performance Test Lead: ' + (formData.perf_lead || '') + '\n\n';
    
    doc += 'PROJECT DESCRIPTION\n';
    doc += '-------------------\n';
    doc += 'High Level Description:\n' + (formData.high_level || '(Not provided)') + '\n\n';
    doc += 'Technical Requirements:\n' + (formData.tech_req || '(Not provided)') + '\n\n';
    
    doc += 'ARCHITECTURE & DEPLOYMENT\n';
    doc += '--------------------------\n';
    doc += 'Architecture:\n' + (formData.architecture || '(Not provided)') + '\n\n';
    doc += 'WebLogic Domain: ' + (formData.weblogic || '') + '\n';
    doc += 'Cluster: ' + (formData.cluster || '') + '\n';
    doc += 'Using SOA: ' + (formData.using_soa || '') + '\n\n';
    
    doc += 'TESTS REQUESTED\n';
    doc += '----------------\n';
    doc += 'Load Test: ' + (formData.test_load || '') + '\n';
    doc += 'Stress Test: ' + (formData.test_stress || '') + '\n';
    doc += 'Stability/Soak Test: ' + (formData.test_stability || '') + '\n';
    doc += 'Resilience & Recoverability: ' + (formData.test_resilience || '') + '\n';
    doc += 'Analysis Service: ' + (formData.svc_analysis || '') + '\n\n';
    
    doc += 'END OF FORM\n';
    doc += 'Generated by FueliX TELUS\n';
    doc += new Date().toISOString() + '\n';
    
    const blob = new Blob([doc], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = (formData.project_name || 'NFT_Request').replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_nft_form.txt';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

renderSection();
</script>
</body>
</html>
